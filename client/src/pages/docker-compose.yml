version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gigconnect_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: gigconnect_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/gigconnect-v2
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key_for_jwt}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build: ./client
    container_name: gigconnect_client
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongodb_data: